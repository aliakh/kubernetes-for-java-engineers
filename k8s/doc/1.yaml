apiVersion: v1
kind: Namespace
metadata:
  name: k8s-program
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config-cm
  namespace: k8s-program
data:
  postgres_db: "postgres"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-config-scr
  namespace: k8s-program
type: Opaque
stringData:
  postgres_user: postgres
  postgres_password: postgres
---
# Shared Spring Boot actuator settings for both microservices
apiVersion: v1
kind: ConfigMap
metadata:
  name: spring-common-cm
  namespace: k8s-program
data:
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,startup"
  MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED: "true"
  MANAGEMENT_HEALTH_READINESSSTATE_ENABLED: "true"
---
# Config specific to resources-service
apiVersion: v1
kind: ConfigMap
metadata:
  name: resources-ms-cm
  namespace: k8s-program
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://resources-db-svc:5432/postgres"
  SONGS_BASE_URL: "http://songs-ms-svc:8081"
---
# Config specific to songs-service
apiVersion: v1
kind: ConfigMap
metadata:
  name: songs-ms-cm
  namespace: k8s-program
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://songs-db-svc:5432/postgres"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: resources-db-sts
  namespace: k8s-program
spec:
  serviceName: resources-db-svc
  replicas: 1
  selector:
    matchLabels:
      app: resources-db-sts
  template:
    metadata:
      labels:
        app: resources-db-sts
    spec:
      containers:
        - name: resources-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          startupProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d postgres"]
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-config-scr
                  key: postgres_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-config-scr
                  key: postgres_password
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: db-config-cm
                  key: postgres_db
          volumeMounts:
            - name: resources-data
              mountPath: /var/lib/postgresql/data
            - name: resources-initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: resources-initdb
          configMap:
            name: resources-initdb-cm
  volumeClaimTemplates:
    - metadata:
        name: resources-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: local-path
        resources:
          requests:
            storage: 300Mi
---
apiVersion: v1
kind: Service
metadata:
  name: resources-db-svc
  namespace: k8s-program
spec:
  clusterIP: None
  selector:
    app: resources-db-sts
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: resources-initdb-cm
  namespace: k8s-program
data:
  01-resources.sql: |
    drop table if exists resources cascade;
    create table resources (
      id serial not null,
      blob bytea,
      primary key (id)
    );
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resources-ms-dpl
  namespace: k8s-program
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resources-ms-dpl
  template:
    metadata:
      labels:
        app: resources-ms-dpl
    spec:
      containers:
        - name: resources-service
          image: resources-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              port: 8080
              path: /actuator/health
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              port: 8080
              path: /actuator/health/liveness
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              port: 8080
              path: /actuator/health/readiness
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 10
          envFrom:
            - configMapRef:
                name: spring-common-cm
            - configMapRef:
                name: resources-ms-cm
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-config-scr
                  key: postgres_user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-config-scr
                  key: postgres_password
---
apiVersion: v1
kind: Service
metadata:
  name: resources-ms-svc
  namespace: k8s-program
spec:
  type: NodePort
  selector:
    app: resources-ms-dpl
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: songs-db-sts
  namespace: k8s-program
spec:
  serviceName: songs-db-svc
  replicas: 1
  selector:
    matchLabels:
      app: songs-db-sts
  template:
    metadata:
      labels:
        app: songs-db-sts
    spec:
      containers:
        - name: songs-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          startupProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d postgres"]
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-config-scr
                  key: postgres_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-config-scr
                  key: postgres_password
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: db-config-cm
                  key: postgres_db
          volumeMounts:
            - name: songs-data
              mountPath: /var/lib/postgresql/data
            - name: songs-initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: songs-initdb
          configMap:
            name: songs-initdb-cm
  volumeClaimTemplates:
    - metadata:
        name: songs-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: local-path
        resources:
          requests:
            storage: 300Mi
---
apiVersion: v1
kind: Service
metadata:
  name: songs-db-svc
  namespace: k8s-program
spec:
  clusterIP: None
  selector:
    app: songs-db-sts
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: songs-initdb-cm
  namespace: k8s-program
data:
  01-songs.sql: |
    drop sequence if exists songs_seq;
    create sequence songs_seq start with 1 increment by 50;
    drop table if exists songs cascade;
    create table songs (
      id integer not null,
      resource_id integer not null unique,
      album varchar(255),
      artist varchar(255),
      length varchar(255),
      name varchar(255),
      year varchar(255),
      genre varchar(255),
      primary key (id)
    );
---
# Dynamic PVC for songs microservice data (if your app needs /data)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: songs-ms-pvc
  namespace: k8s-program
spec:
  accessModes: [ "ReadWriteOnce" ]
  storageClassName: local-path
  resources:
    requests:
      storage: 300Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: songs-ms-dpl
  namespace: k8s-program
spec:
  replicas: 2
  selector:
    matchLabels:
      app: songs-ms-dpl
  template:
    metadata:
      labels:
        app: songs-ms-dpl
    spec:
      containers:
        - name: songs-service
          image: songs-service:1.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          startupProbe:
            httpGet:
              port: 8081
              path: /actuator/health
            failureThreshold: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              port: 8081
              path: /actuator/health/liveness
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              port: 8081
              path: /actuator/health/readiness
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 10
          envFrom:
            - configMapRef:
                name: spring-common-cm
            - configMapRef:
                name: songs-ms-cm
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-config-scr
                  key: postgres_user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-config-scr
                  key: postgres_password
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: songs-ms-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: songs-ms-svc
  namespace: k8s-program
spec:
  type: NodePort
  selector:
    app: songs-ms-dpl
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
