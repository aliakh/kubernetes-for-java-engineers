# Source: heml/templates/songs-ms-dpl.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: songs-ms-dpl
  namespace: k8s-program
  annotations:
    kubernetes.io/change-cause: "add the genre column to the songs table"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: songs-ms-dpl
  template:
    metadata:
      labels:
        app: songs-ms-dpl
    spec:
      containers:
        - name: songs-service
          image: songs-service:1.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          env:
            - name: SONGS_DB_URL
              valueFrom:
                configMapKeyRef:
                  name: songs-ms-config-cm
                  key: SONGS_DB_URL
            - name: SONGS_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: songs-ms-config-cm
                  key: SONGS_DB_PORT
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: songs-pvc
---
# Source: heml/templates/resources-db-sts.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: resources-db-sts
  namespace: k8s-program
spec:
  serviceName: resources-db-svc
  replicas: 1
  selector:
    matchLabels:
      app: resources-db-sts
  template:
    metadata:
      labels:
        app: resources-db-sts
    spec:
      containers:
        - name: resources-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          startupProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d postgres"]
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-config-scr
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-config-scr
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: db-config-cm
                  key: POSTGRES_DB
          volumeMounts:
            - name: resources-data
              mountPath: /var/lib/postgresql/data
            - name: resources-initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: resources-initdb
          configMap:
            name: resources-initdb-cm
            items:
              - key: resources_initdb.sql
                path: resources_initdb.sql
  volumeClaimTemplates:
    - metadata:
        name: resources-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: hostpath
        resources:
          requests:
            storage: 300Mi
---
