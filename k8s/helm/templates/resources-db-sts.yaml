apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: resources-db-sts
  namespace: {{ .Values.namespace }}
spec:
  serviceName: resources-db-svc
  replicas: {{ .Values.resources_db_svc.replicas }}
  selector:
    matchLabels:
      app: resources-db-sts
  template:
    metadata:
      labels:
        app: resources-db-sts
    spec:
      containers:
        - name: resources-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          startupProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d postgres"]
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-config-scr
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-config-scr
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: db-config-cm
                  key: POSTGRES_DB
          volumeMounts:
            - name: resources-data
              mountPath: /var/lib/postgresql/data
            - name: resources-initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: resources-initdb
          configMap:
            name: resources-initdb-cm
            items:
              - key: resources_initdb.sql
                path: resources_initdb.sql
  volumeClaimTemplates:
    - metadata:
        name: resources-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: hostpath
        resources:
          requests:
            storage: 300Mi
