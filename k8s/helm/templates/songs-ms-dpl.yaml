apiVersion: apps/v1
kind: Deployment
metadata:
  name: songs-ms-dpl
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/change-cause: "add the genre column to the songs table"
spec:
  replicas: {{ .Values.songs_ms_dpl.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: songs-ms-dpl
  template:
    metadata:
      labels:
        app: songs-ms-dpl
    spec:
      containers:
        - name: songs-service
          image: songs-service:1.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          {{- include "probes.actuator" 8081 | nindent 10 }}
          env:
            - name: SONGS_DB_URL
              valueFrom:
                configMapKeyRef:
                  name: songs-ms-config-cm
                  key: SONGS_DB_URL
            - name: SONGS_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: songs-ms-config-cm
                  key: SONGS_DB_PORT
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: songs-pvc
