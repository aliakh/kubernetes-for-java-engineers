apiVersion: v1
kind: ConfigMap
metadata:
  name: resources-initdb-cm
  namespace: {{ .Values.namespace }}
  labels: {{ include "config_map.labels" . | nindent 4 }}
data:
  resources_initdb.sql: |
    drop table if exists resources cascade;
    create table resources (
      id serial not null,
      blob bytea,
      primary key (id)
    );
