apiVersion: apps/v1
kind: Deployment
metadata:
  name: resources-service-deployment
  namespace: k8s-program
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resources-service
  template:
    metadata:
      labels:
        app: resources-service
    spec:
      containers:
        - name: resources-service
          image: resources-image:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: RESOURCES_DB_URL
              value: "resources-db-service"
            - name: RESOURCES_DB_PORT
              value: "5432"
            - name: SONGS_MS_URL
              value: "songs-service"
            - name: SONGS_MS_PORT
              value: "8081"
            - name: RESOURCES_DB_NAME
              value: "resources-db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "postgres"



---
apiVersion: v1
kind: Service
metadata:
  name: resources-service
  namespace: k8s-program
spec:
  type: NodePort
  selector:
    app: resources-service
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30001