apiVersion: apps/v1
kind: Deployment
metadata:
  name: resources
  namespace: k8s-program
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resources
  template:
    metadata:
      labels:
        app: resources
    spec:
      automountServiceAccountToken: false
      containers:
        - name: resources
          image: resources-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
              ephemeral-storage: "300Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
              ephemeral-storage: "1Gi"
          env:
            - {
              name: JAVA_TOOL_OPTIONS,
              value: "-XX:InitialRAMPercentage=35 -XX:MaxRAMPercentage=70 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError",
            }
            - { name: RESOURCES_MS_NAME, value: "resources-ms" }
            - { name: RESOURCES_MS_PORT, value: "8080" }
            - { name: SONGS_SERVICE_URL, value: "songs" }
            - { name: SONGS_SERVICE_PORT, value: "8081" }
            - { name: ENABLE_EUREKA_CLIENT, value: "false" }
            - {
              name: SPRING_CLOUD_SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED,
              value: "false",
            }
            - { name: EUREKA_CLIENT_REGISTER_WITH_EUREKA, value: "false" }
            - { name: EUREKA_CLIENT_FETCH_REGISTRY, value: "false" }
            - {
              name: SPRING_DATASOURCE_URL,
              value: "jdbc:postgresql://resources-db:5432/resources",
            }
            - { name: SPRING_DATASOURCE_USERNAME, value: "postgres" }
            - { name: SPRING_DATASOURCE_PASSWORD, value: "postgres" }
            - { name: SPRING_JPA_HIBERNATE_DDL_AUTO, value: "update" }
            - { name: SPRING_JPA_SHOW_SQL, value: "true" }
            - {
              name: SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL,
              value: "true",
            }
