apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: songs-db
  namespace: k8s-program
spec:
  serviceName: songs-db
  replicas: 1
  selector:
    matchLabels:
      app: songs-db
  template:
    metadata:
      labels:
        app: songs-db
    spec:
      automountServiceAccountToken: false
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres
          resources:
            requests:
              cpu: "500m"
              memory: "1.5Gi"
              ephemeral-storage: "300Mi"
            limits:
              cpu: "2"
              memory: "3Gi"
              ephemeral-storage: "1Gi"
          env:
            - { name: POSTGRES_DB, value: songs }
            - { name: POSTGRES_USER, value: postgres }
            - { name: POSTGRES_PASSWORD, value: postgres }
          volumeMounts:
            - { name: songs-db-data, mountPath: /var/lib/postgresql/data }
  volumeClaimTemplates:
    - metadata:
        name: songs-db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: hostpath
        resources:
          requests:
            storage: 1Gi
