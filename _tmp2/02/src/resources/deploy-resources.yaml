apiVersion: apps/v1
kind: Deployment
metadata:
  name: resources
  namespace: k8s-program
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resources
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: resources
    spec:
      automountServiceAccountToken: false
      containers:
        - name: resources
          image: resources-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
              ephemeral-storage: "300Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
              ephemeral-storage: "1Gi"
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: resources-db-credentials
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: resources-db-credentials
                  key: POSTGRES_PASSWORD
          envFrom:
            - configMapRef: { name: app-common }
            - configMapRef: { name: resources-config }
